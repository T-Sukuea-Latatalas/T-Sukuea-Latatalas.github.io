<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リンク集</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* ナビゲーションバーのスクロールバーを非表示にするスタイル */
        #nav-container::-webkit-scrollbar {
            display: none;
        }
        #nav-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans">

    <!-- ヘッダーエリア（追従型ナビゲーション） -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <h1 id="site-title" class="text-xl font-bold text-gray-900 tracking-tight">マイリンク集</h1>
                <!-- 自動生成されるナビゲーションボタンのコンテナ -->
                <nav id="nav-container" class="flex gap-2 overflow-x-auto py-1">
                    <!-- JavaScriptでボタンが動的に挿入されます -->
                </nav>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        
        <!-- ローディング表示 -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-gray-500 text-sm">データを読み込んでいます...</p>
        </div>

        <!-- エラーメッセージ（またはURL未設定時の案内） -->
        <div id="error-message" class="hidden max-w-xl mx-auto bg-yellow-50 border border-yellow-200 text-yellow-800 rounded-lg p-6 my-8">
            <h3 class="font-bold text-lg mb-2">設定が必要です</h3>
            <p id="error-text" class="text-sm leading-relaxed mb-4"></p>
            <div class="text-xs text-gray-600 bg-white p-3 rounded border border-yellow-100">
                <strong>CSVデータの確認用ダミーフォーマット:</strong><br>
                1行目: リスト名, URL, 説明<br>
                2行目: SNS, https://twitter.com, 公式X（旧Twitter）アカウント
            </div>
        </div>

        <!-- リンク集の描画エリア -->
        <div id="content-container" class="space-y-12">
            <!-- JavaScriptでカテゴリごとのセクションとカードが動的に挿入されます -->
        </div>

    </main>

    <!-- フッター -->
    <footer class="bg-white border-t border-gray-200 py-6 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center text-xs text-gray-400">
            &copy; <span id="current-year"></span> Link Portal. Powered by Google Sheets & GitHub Pages.
        </div>
    </footer>

    <script>
        // ==========================================
        // ⚠️ GoogleスプレッドシートのCSV URLを設定してください
        // ==========================================
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLQdZxjIRCoE5H2a_Dpi9Xwf-tPO3CGJoth3bY7pBU-HYwPkd2PeBYCULgXvWnC0W2ZN4lXeT7xdRX/pub?gid=0&single=true&output=csv';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();

            const navContainer = document.getElementById('nav-container');
            const contentContainer = document.getElementById('content-container');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');
            const errorTextEl = document.getElementById('error-text');

            // プレースホルダーのまま、または未設定の場合の処理
            if (CSV_URL === 'YOUR_CSV_URL_HERE' || !CSV_URL.trim()) {
                showError('CSVの取得先URLが設定されていません。コード（index.html）内の <code>const CSV_URL = \'YOUR_CSV_URL_HERE\';</code> を取得したURLに書き換えてください。');
                return;
            }

            // CSVデータの取得
            fetch(CSV_URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('CSVファイルの読み込みに失敗しました。URLが正しいか、公開設定が完了しているかご確認ください。');
                    }
                    return response.text();
                })
                .then(csvText => {
                    // PapaParseによる解析
                    Papa.parse(csvText, {
                        skipEmptyLines: true,
                        complete: function(results) {
                            renderData(results.data);
                        },
                        error: function(error) {
                            showError('データの解析（パース）に失敗しました: ' + error.message);
                        }
                    });
                })
                .catch(err => {
                    showError(err.message);
                });

            // エラー表示用関数
            function showError(message) {
                loadingEl.classList.add('hidden');
                errorTextEl.innerHTML = message;
                errorEl.classList.remove('hidden');
            }

            // 特殊文字のサニタイズ（XSS対策）
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }

            // データの描画処理
            function renderData(data) {
                // ヘッダー行を除去
                if (data.length <= 1) {
                    showError('スプレッドシートにデータが見つかりません。行が追加されているかご確認ください。');
                    return;
                }

                const rows = data.slice(1);
                const groups = {};

                // データを「リスト名（カテゴリ）」ごとにグループ化
                rows.forEach(row => {
                    const category = row[0]?.trim();
                    const url = row[1]?.trim();
                    const description = row[2]?.trim() || '';

                    if (!category || !url) return; // カテゴリまたはURLがない行は除外

                    if (!groups[category]) {
                        groups[category] = [];
                    }
                    groups[category].push({ url, description });
                });

                const categories = Object.keys(groups);
                if (categories.length === 0) {
                    showError('表示可能な有効なリンクデータがありません。スプレッドシートの「リスト名」と「URL」を入力してください。');
                    return;
                }

                // ローディングを非表示にする
                loadingEl.classList.add('hidden');

                // 1. ナビゲーション（アンカーリンク）の生成
                categories.forEach(category => {
                    const btn = document.createElement('a');
                    btn.href = `#${encodeURIComponent(category)}`;
                    btn.textContent = category;
                    btn.className = "px-3 py-1.5 bg-gray-100 text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-full text-xs font-medium transition whitespace-nowrap border border-transparent hover:border-indigo-200";
                    navContainer.appendChild(btn);
                });

                // 2. セクションとカードの生成
                categories.forEach(category => {
                    const section = document.createElement('section');
                    section.id = category;
                    // ヘッダーが固定表示（sticky）されるため、その高さ分スクロール位置を調整
                    section.className = "scroll-mt-28"; 

                    // カテゴリ見出し
                    const heading = document.createElement('h2');
                    heading.className = "text-lg font-bold text-gray-900 border-b-2 border-indigo-500 pb-2 mb-4 flex items-center";
                    heading.innerHTML = `
                        <span class="w-2.5 h-2.5 bg-indigo-500 rounded-full mr-2"></span>
                        ${escapeHtml(category)}
                    `;
                    section.appendChild(heading);

                    // カードを格納するグリッド
                    const grid = document.createElement('div');
                    grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4";

                    groups[category].forEach(item => {
                        const card = document.createElement('a');
                        card.href = item.url;
                        card.target = "_blank";
                        card.rel = "noopener noreferrer";
                        card.className = "group block p-5 bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md hover:border-indigo-300 transition duration-200 flex flex-col justify-between";

                        // ドメインの簡易抽出（見栄え用）
                        let displayHost = '';
                        try {
                            displayHost = new URL(item.url).hostname;
                        } catch(e) {
                            displayHost = 'リンク先へ移動';
                        }

                        card.innerHTML = `
                            <div>
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-[10px] font-bold tracking-wider text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded uppercase">
                                        LINK
                                    </span>
                                    <svg class="w-4 h-4 text-gray-300 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                    </svg>
                                </div>
                                <h3 class="text-base font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors break-all line-clamp-1 mb-1">
                                    ${displayHost}
                                </h3>
                                <p class="text-xs text-gray-500 line-clamp-2 leading-relaxed mb-4">
                                    ${escapeHtml(item.description || '説明はありません。')}
                                </p>
                            </div>
                            <div class="text-[10px] text-gray-400 break-all pt-2 border-t border-gray-100">
                                ${escapeHtml(item.url)}
                            </div>
                        `;
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    contentContainer.appendChild(section);
                });
            }
        });
    </script>
</body>
</html>
